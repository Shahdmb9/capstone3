spring.application.name=capstone3

spring.datasource.url=jdbc:mysql://localhost:3306/habit_system


spring.datasource.username=root

spring.datasource.password=

# hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

####################
spring.jpa.show-sql=true

spring.jpa.generate-ddl=true

#create-drop كل ما شغلت السيرفر يسوي كرييت دروب
#اذا بينهم رليشن اخليه ابديتد
spring.jpa.hibernate.ddl-auto=create-drop

spring.web.error.include-message=always

spring.web.error.include-stacktrace=always

